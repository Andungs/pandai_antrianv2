server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1024;

    # ── WebSocket Proxy: Terminal Server ──────────────────────────────────────
    # Browser terhubung ke wss://pandaihost.id/ws-terminal/...
    # Nginx forward sebagai ws:// ke container internal (tidak ada SSL issue)
    location /ws-terminal/ {
        #proxy_pass http://10.10.10.6:8092/;

        # Header wajib untuk WebSocket upgrade
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeout panjang — koneksi terminal bisa hidup lama
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_connect_timeout 10s;
    }

    # Vue Router — fallback semua request ke index.html (SPA)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache assets statis (Vite menghasilkan nama file hashed)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header X-XSS-Protection "1; mode=block";
    add_header Referrer-Policy "strict-origin-when-cross-origin";
}
