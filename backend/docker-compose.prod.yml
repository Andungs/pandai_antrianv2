services:
  pandaiantrian-api:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: pandaiantrian-api
    restart: always
    # command: php artisan serve --host=0.0.0.0 --port=8000
    volumes:
      - .:/var/www
    networks:
      cloud-container:
        ipv4_address: 10.10.10.4
networks:
  cloud-container:
    external: true
