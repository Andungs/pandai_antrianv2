services:
  pandaiantrian_api:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: pandaiantrian_api
    restart: always
    volumes:
      - .:/var/www
    networks:
      cloud-container:
        ipv4_address: 10.10.10.4

  pandaiantrian-reverb:
    build: .
    container_name: pandaiantrian-reverb
    restart: unless-stopped
    command: php artisan reverb:start --host=0.0.0.0 --port=8080 --debug
    volumes:
      - .:/var/www
    ports:
      - "8099:8080"
    networks:
      cloud-container:
        ipv4_address: 10.10.10.5

  pandaiantrian-queue:
    build: .
    container_name: pandaiantrian-queue
    restart: unless-stopped
    command: php artisan queue:work database --queue=default --tries=3 --backoff=10,30,60 --sleep=3 --timeout=120
    volumes:
      - .:/var/www
    depends_on:
      - pandaiantrian-api
    networks:
      cloud-container:
        ipv4_address: 10.10.10.6

networks:
  cloud-container:
    external: true
